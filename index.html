<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Babble</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .page {
      padding: 32px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .board-wrapper {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: flex-start;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .shuffle-button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #4f8cff;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
    }

    .shuffle-button:hover {
      background: #3c76db;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 56px);
      gap: 4px;
      background: white;
      padding: 16px;
      border-radius: 16px;
      width: fit-content;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .cell {
      width: 56px;
      height: 56px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #f8ecc8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell.highlight {
      outline: 3px solid #7aa7ff;
    }

    .rack {
      display: flex;
      gap: 8px;
      padding: 16px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      min-height: 72px;
      flex-wrap: wrap;
    }

    .rack-slot {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rack-slot.empty {
      border: 1px dashed #cfcfcf;
      background: #fafafa;
    }

    .tile {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 1px solid #b89f6b;
      background: #f2d79a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      cursor: grab;
      user-select: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .tile.selected {
      outline: 3px solid #4f8cff;
      background: #e6f0ff;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Babble</h1>
    <div class="board-wrapper">
      <div class="controls">
        <button id="shuffleBtn" class="shuffle-button">Shuffle</button>
      </div>
      <div id="board" class="board"></div>
      <div id="rack" class="rack"></div>
    </div>
  </div>

  <script>
    const letters = "PLAYDRAMACTOSTGE".split("");
    const boardSize = 49;

    const boardEl = document.getElementById("board");
    const rackEl = document.getElementById("rack");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let board = Array(boardSize).fill(null);
    let rack = shuffleArray(
      letters.map((letter, index) => ({
        id: index,
        letter
      }))
    );

    let selectedTileId = null;
    let draggedTileId = null;

    function getTileById(id) {
      for (const tile of rack) {
        if (tile && tile.id === id) return tile;
      }
      for (const tile of board) {
        if (tile && tile.id === id) return tile;
      }
      return null;
    }

    function findTileLocation(tileId) {
      for (let i = 0; i < rack.length; i++) {
        if (rack[i] && rack[i].id === tileId) {
          return { area: "rack", index: i };
        }
      }
      for (let i = 0; i < board.length; i++) {
        if (board[i] && board[i].id === tileId) {
          return { area: "board", index: i };
        }
      }
      return null;
    }

    function moveTile(tileId, targetArea, targetIndex) {
      if (tileId === null) return;

      const source = findTileLocation(tileId);
      if (!source) return;

      let movingTile;
      if (source.area === "rack") {
        movingTile = rack[source.index];
        rack[source.index] = null;
      } else {
        movingTile = board[source.index];
        board[source.index] = null;
      }

      let targetTile = null;
      if (targetArea === "rack") {
        targetTile = rack[targetIndex];
        rack[targetIndex] = movingTile;
      } else {
        targetTile = board[targetIndex];
        board[targetIndex] = movingTile;
      }

      if (targetTile) {
        if (source.area === "rack") {
          rack[source.index] = targetTile;
        } else {
          board[source.index] = targetTile;
        }
      }

      selectedTileId = null;
      render();
    }

    function shuffleRack() {
      const rackTiles = rack.filter(tile => tile !== null);
      const shuffledTiles = shuffleArray(rackTiles);

      let shuffledIndex = 0;
      rack = rack.map(slot => {
        if (slot === null) return null;
        return shuffledTiles[shuffledIndex++];
      });

      selectedTileId = null;
      draggedTileId = null;
      render();
    }

    function createTileElement(tile) {
      const tileEl = document.createElement("div");
      tileEl.className = "tile";
      if (selectedTileId === tile.id) {
        tileEl.classList.add("selected");
      }

      tileEl.textContent = tile.letter;
      tileEl.draggable = true;

      tileEl.addEventListener("click", (e) => {
        e.stopPropagation();
        selectedTileId = selectedTileId === tile.id ? null : tile.id;
        render();
      });

      tileEl.addEventListener("dragstart", () => {
        draggedTileId = tile.id;
        selectedTileId = tile.id;
      });

      tileEl.addEventListener("dragend", () => {
        draggedTileId = null;
      });

      return tileEl;
    }

    function render() {
      boardEl.innerHTML = "";
      rackEl.innerHTML = "";

      for (let i = 0; i < board.length; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        cell.addEventListener("click", () => {
          if (selectedTileId !== null) {
            moveTile(selectedTileId, "board", i);
          }
        });

        cell.addEventListener("dragover", (e) => {
          e.preventDefault();
          cell.classList.add("highlight");
        });

        cell.addEventListener("dragleave", () => {
          cell.classList.remove("highlight");
        });

        cell.addEventListener("drop", (e) => {
          e.preventDefault();
          cell.classList.remove("highlight");
          if (draggedTileId !== null) {
            moveTile(draggedTileId, "board", i);
            draggedTileId = null;
          }
        });

        if (board[i]) {
          cell.appendChild(createTileElement(board[i]));
        }

        boardEl.appendChild(cell);
      }

      for (let i = 0; i < rack.length; i++) {
        const slot = document.createElement("div");
        slot.className = "rack-slot";

        slot.addEventListener("click", () => {
          if (selectedTileId !== null) {
            moveTile(selectedTileId, "rack", i);
          }
        });

        slot.addEventListener("dragover", (e) => {
          e.preventDefault();
        });

        slot.addEventListener("drop", (e) => {
          e.preventDefault();
          if (draggedTileId !== null) {
            moveTile(draggedTileId, "rack", i);
            draggedTileId = null;
          }
        });

        if (rack[i]) {
          slot.appendChild(createTileElement(rack[i]));
        } else {
          slot.classList.add("empty");
        }

        rackEl.appendChild(slot);
      }
    }

    shuffleBtn.addEventListener("click", shuffleRack);

    render();
  </script>
</body>
</html>
