<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Babble</title>
  <style>
    :root {
      --cell-size: min(12vw, 56px);
      --board-gap: min(1vw, 4px);
      --rack-gap: min(1.5vw, 8px);
      --page-padding: clamp(12px, 4vw, 32px);
      --tile-font: clamp(18px, 4.8vw, 24px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .page {
      padding: var(--page-padding);
    }

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin: 0 0 20px;
  flex-wrap: wrap;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-start;
}

.top-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

    h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 40px);
    }

    .subtitle {
      margin-top: 4px;
      font-size: clamp(14px, 3vw, 18px);
      color: #555;
    }

    .score-box {
      background: white;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      font-size: clamp(16px, 3.6vw, 20px);
      font-weight: 700;
      width: fit-content;
    }

    .board-wrapper {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, var(--cell-size));
      gap: var(--board-gap);
      background: white;
      padding: clamp(8px, 2.5vw, 16px);
      border-radius: 16px;
      width: fit-content;
      max-width: 100%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #f8ecc8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .cell-modifier {
      font-size: clamp(12px, 4vw, 22px);
      font-weight: 800;
      color: #111;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      font-family: "Comic Sans MS", "Marker Felt", cursive;
    }

    .cell.highlight {
      outline: 3px solid #7aa7ff;
    }

    .cell.mod-3w {
      background: #cdb4ff;
    }

    .cell.mod-2w {
      background: #93c5fd;
    }

    .cell.mod-3l {
      background: #86efac;
    }

    .cell.mod-2l {
      background: #fde68a;
    }

    .cell.shadow {
      background: #d6d6d6;
    }

    .cell.shadow.mod-3w {
      background: #b8a0ea;
    }

    .cell.shadow.mod-2w {
      background: #79afe8;
    }

    .cell.shadow.mod-3l {
      background: #6fd78f;
    }

    .cell.shadow.mod-2l {
      background: #ebd06b;
    }

    .rack {
      display: grid;
      grid-template-columns: repeat(auto-fit, var(--cell-size));
      gap: var(--rack-gap);
      justify-content: center;
      padding: clamp(10px, 2.5vw, 16px);
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      min-height: calc(var(--cell-size) + 32px);
      width: 100%;
    }

    .rack-slot {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rack-slot.empty {
      border: 1px dashed #cfcfcf;
      background: #fafafa;
    }

    .rack-slot.highlight {
      outline: 3px solid #7aa7ff;
    }

    .tile {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 8px;
      border: 1px solid #b89f6b;
      background: #f2d79a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .tile.mod-3w {
      background: #cdb4ff;
      border-color: #9b7fe8;
    }

    .tile.mod-2w {
      background: #93c5fd;
      border-color: #5aa2f6;
    }

    .tile.mod-3l {
      background: #86efac;
      border-color: #59c97c;
    }

    .tile.mod-2l {
      background: #fde68a;
      border-color: #e5c454;
    }

    .tile.locked {
      cursor: default;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15), inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }

    .tile-letter {
      font-size: var(--tile-font);
      font-weight: bold;
      line-height: 1;
    }

    .tile-points {
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: clamp(8px, 2vw, 11px);
      font-weight: 700;
      line-height: 1;
      color: #5f4a1e;
      white-space: nowrap;
    }

    .tile-modifier {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: clamp(8px, 2vw, 11px);
      font-weight: 700;
      line-height: 1;
      color: #5f4a1e;
      white-space: nowrap;
    }

    .tile.selected {
      outline: 3px solid #4f8cff;
      background: #e6f0ff;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .control-button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #4f8cff;
      color: white;
      font-size: clamp(14px, 3.8vw, 16px);
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      touch-action: manipulation;
      min-width: 120px;
    }

    .control-button:hover {
      background: #3c76db;
    }

    .control-button:disabled {
      background: #9fb8f4;
      cursor: default;
    }

    .top-button {
      min-width: 0;
      padding: 8px 14px;
    }

    .shadow-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 8px 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      font-size: clamp(14px, 3.6vw, 16px);
      font-weight: 600;
      color: #333;
    }

    .shadow-toggle input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      opacity: 0.9;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      from {
        transform: translateY(0) rotate(0deg);
      }
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

@media (max-width: 600px) {
  :root {
    --cell-size: min(11.5vw, 48px);
  }

  .page {
    padding: 12px;
  }

  .board-wrapper {
    gap: 14px;
  }

  .controls {
    flex-direction: row;
    align-items: stretch;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 8px;
  }

  .controls .control-button {
    width: auto;
    min-width: 0;
    flex: 1 1 0;
    padding: 10px 8px;
  }

  .top-button {
    width: auto;
  }

  .rack {
    grid-template-columns: repeat(auto-fit, var(--cell-size));
  }
}
  </style>
</head>
<body>
  <div class="page">
<div class="header">
  <div class="header-left">
    <h1>Babble</h1>
    <div class="subtitle">4/2/26: All the World's</div>

    <div class="top-controls">
      <button id="hintBtn" class="control-button top-button">Hint (0)</button>
      <label class="shadow-toggle">
        <input id="shadowToggle" type="checkbox" />
        <span>Shadow</span>
      </label>
    </div>
  </div>

  <div class="score-box">
    Score: <span id="score">0</span>
  </div>
</div>

    <div class="board-wrapper">
      <div id="board" class="board"></div>
      <div id="rack" class="rack"></div>
      <div class="controls">
        <button id="shuffleBtn" class="control-button">Shuffle</button>
        <button id="rackBtn" class="control-button">Rack</button>
        <button id="checkBtn" class="control-button">Check</button>
      </div>
    </div>
  </div>

  <div id="confetti-container" class="confetti-container"></div>

  <script>
    const letters = "PLAYDRAMACTOSTGE".split("");

    const boardWidth = 7;
    const boardHeight = 7;
    const boardSize = boardWidth * boardHeight;

    const boardModifiers = {
      "0-2": "3W",
      "0-3": "3L",
      "4-1": "2L",
      "4-5": "2W"
    };

    const solvedBoard = [
      "PLAY···",
      "··C····",
      "··T··S·",
      "··O··T·",
      "·DRAMA·",
      "·····G·",
      "·····E·"
    ];

    const boardEl = document.getElementById("board");
    const rackEl = document.getElementById("rack");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const rackBtn = document.getElementById("rackBtn");
    const hintBtn = document.getElementById("hintBtn");
    const shadowToggle = document.getElementById("shadowToggle");
    const checkBtn = document.getElementById("checkBtn");
    const scoreEl = document.getElementById("score");
    const confettiContainer = document.getElementById("confetti-container");

    let dictionary = new Set();
    let dictionaryLoaded = false;
    let confettiActive = false;
    let selectedTileId = null;
    let draggedTileId = null;
    let shadowEnabled = false;
    let touchDraggedTileId = null;
    let touchGhostEl = null;
    let touchSourceEl = null;

    const letterPoints = {
      A: 1, B: 3, C: 3, D: 2, E: 1, F: 4, G: 2, H: 4, I: 1,
      J: 8, K: 5, L: 1, M: 3, N: 1, O: 1, P: 3, Q: 10, R: 1,
      S: 1, T: 1, U: 1, V: 4, W: 4, X: 8, Y: 4, Z: 10
    };

    const allTiles = letters.map((letter, index) => ({
      id: index,
      letter,
      locked: false
    }));

    let board = Array(boardSize).fill(null);
    let rack = shuffleArray([...allTiles]);

    function getSolutionPlacements() {
      const placements = [];

      for (let row = 0; row < boardHeight; row++) {
        for (let col = 0; col < boardWidth; col++) {
          const letter = solvedBoard[row][col];
          if (letter !== "·") {
            placements.push({ row, col, letter });
          }
        }
      }

      return placements;
    }

    function isSolutionCell(row, col) {
      return solvedBoard[row][col] !== "·";
    }

    function toggleShadow() {
      shadowEnabled = shadowToggle.checked;
      render();
    }

    function getRevealPriority(entry) {
      const base = letterPoints[entry.letter] ?? 0;
      const modifier = getModifierAt(entry.row, entry.col);

      let letterMultiplier = 1;
      let wordMultiplier = 1;

      if (modifier && modifier.endsWith("L")) {
        letterMultiplier = Number(modifier[0]);
      }
      if (modifier && modifier.endsWith("W")) {
        wordMultiplier = Number(modifier[0]);
      }

      return base * letterMultiplier * wordMultiplier;
    }

    const hintQueue = getSolutionPlacements().sort((a, b) => {
      const diff = getRevealPriority(b) - getRevealPriority(a);
      if (diff !== 0) return diff;

      const baseDiff = (letterPoints[b.letter] ?? 0) - (letterPoints[a.letter] ?? 0);
      if (baseDiff !== 0) return baseDiff;

      if (a.row !== b.row) return a.row - b.row;
      return a.col - b.col;
    });

    let revealedHintCount = 0;

    async function loadDictionary() {
      try {
        const response = await fetch("./dictionary.txt");
        if (!response.ok) {
          throw new Error(`Failed to load dictionary: ${response.status}`);
        }

        const text = await response.text();
        dictionary = new Set(
          text
            .split(/\r?\n/)
            .map(word => word.trim().toUpperCase())
            .filter(Boolean)
        );

        dictionaryLoaded = true;
        console.log(`Loaded ${dictionary.size} dictionary words.`);
      } catch (error) {
        console.error(error);
        alert("Could not load dictionary.txt. Make sure you're running this from a local server.");
      }
    }

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function findTileLocation(tileId) {
      for (let i = 0; i < rack.length; i++) {
        if (rack[i] && rack[i].id === tileId) {
          return { area: "rack", index: i };
        }
      }

      for (let i = 0; i < board.length; i++) {
        if (board[i] && board[i].id === tileId) {
          return { area: "board", index: i };
        }
      }

      return null;
    }

    function findMovableTileByLetter(letter) {
      for (let i = 0; i < rack.length; i++) {
        if (rack[i] && rack[i].letter === letter && !rack[i].locked) {
          return { area: "rack", index: i, tile: rack[i] };
        }
      }

      for (let i = 0; i < board.length; i++) {
        if (board[i] && board[i].letter === letter && !board[i].locked) {
          return { area: "board", index: i, tile: board[i] };
        }
      }

      return null;
    }

    function getModifierAt(row, col) {
      return boardModifiers[`${row}-${col}`] ?? null;
    }

    function getModifierClass(modifier) {
      if (!modifier) return "";
      return `mod-${modifier.toLowerCase()}`;
    }

    function getTileModifierText(boardIndex) {
      if (boardIndex === null) return "";

      const row = Math.floor(boardIndex / boardWidth);
      const col = boardIndex % boardWidth;
      return getModifierAt(row, col) ?? "";
    }

    function getTilePointsText(tile) {
      return String(letterPoints[tile.letter] ?? 0);
    }

    function getBoardLetter(row, col) {
      const index = row * boardWidth + col;
      const tile = board[index];
      return tile ? tile.letter : null;
    }

    function moveTile(tileId, targetArea, targetIndex) {
      if (tileId === null) return;

      const source = findTileLocation(tileId);
      if (!source) return;

      const sourceTile = source.area === "rack" ? rack[source.index] : board[source.index];
      if (!sourceTile || sourceTile.locked) return;

      let movingTile;
      if (source.area === "rack") {
        movingTile = rack[source.index];
        rack[source.index] = null;
      } else {
        movingTile = board[source.index];
        board[source.index] = null;
      }

      let targetTile = null;
      if (targetArea === "rack") {
        targetTile = rack[targetIndex];
        rack[targetIndex] = movingTile;
      } else {
        targetTile = board[targetIndex];
        if (targetTile?.locked) {
          if (source.area === "rack") {
            rack[source.index] = movingTile;
          } else {
            board[source.index] = movingTile;
          }
          return;
        }
        board[targetIndex] = movingTile;
      }

      if (targetTile) {
        if (source.area === "rack") {
          rack[source.index] = targetTile;
        } else {
          board[source.index] = targetTile;
        }
      }

      selectedTileId = null;
      render();
    }

    function rackAllTiles() {
      const movableBoardTiles = [];

      for (let i = 0; i < board.length; i++) {
        if (board[i] && !board[i].locked) {
          movableBoardTiles.push(board[i]);
          board[i] = null;
        }
      }

      for (const tile of movableBoardTiles) {
        const emptyRackIndex = rack.findIndex(slot => slot === null);
        if (emptyRackIndex !== -1) {
          rack[emptyRackIndex] = tile;
        } else {
          rack.push(tile);
        }
      }

      selectedTileId = null;
      draggedTileId = null;
      render();
    }

    function shuffleRack() {
      const rackTiles = rack.filter(tile => tile !== null);
      const shuffledTiles = shuffleArray(rackTiles);

      let shuffledIndex = 0;
      rack = rack.map(slot => {
        if (slot === null) return null;
        return shuffledTiles[shuffledIndex++];
      });

      selectedTileId = null;
      draggedTileId = null;
      render();
    }

    function getWordsFromBoard() {
      const foundWords = [];

      for (let row = 0; row < boardHeight; row++) {
        let currentWord = "";
        let positions = [];

        for (let col = 0; col < boardWidth; col++) {
          const letter = getBoardLetter(row, col);

          if (letter) {
            currentWord += letter;
            positions.push([row, col]);
          } else {
            if (currentWord.length >= 2) {
              foundWords.push({
                word: currentWord,
                direction: "horizontal",
                positions
              });
            }
            currentWord = "";
            positions = [];
          }
        }

        if (currentWord.length >= 2) {
          foundWords.push({
            word: currentWord,
            direction: "horizontal",
            positions
          });
        }
      }

      for (let col = 0; col < boardWidth; col++) {
        let currentWord = "";
        let positions = [];

        for (let row = 0; row < boardHeight; row++) {
          const letter = getBoardLetter(row, col);

          if (letter) {
            currentWord += letter;
            positions.push([row, col]);
          } else {
            if (currentWord.length >= 2) {
              foundWords.push({
                word: currentWord,
                direction: "vertical",
                positions
              });
            }
            currentWord = "";
            positions = [];
          }
        }

        if (currentWord.length >= 2) {
          foundWords.push({
            word: currentWord,
            direction: "vertical",
            positions
          });
        }
      }

      return foundWords;
    }

    function getLetterScoreAt(row, col) {
      const letter = getBoardLetter(row, col);
      if (!letter) return 0;

      const base = letterPoints[letter] ?? 0;
      const modifier = getModifierAt(row, col);

      if (modifier && modifier.endsWith("L")) {
        return base * Number(modifier[0]);
      }

      return base;
    }

    function getWordScore(wordEntry) {
      let total = 0;
      let wordMultiplier = 1;

      for (const [row, col] of wordEntry.positions) {
        total += getLetterScoreAt(row, col);

        const modifier = getModifierAt(row, col);
        if (modifier && modifier.endsWith("W")) {
          wordMultiplier *= Number(modifier[0]);
        }
      }

      return total * wordMultiplier;
    }

    function getTotalBoardScore() {
      const words = getWordsFromBoard();
      return words.reduce((sum, wordEntry) => sum + getWordScore(wordEntry), 0);
    }

    function isSolvedBoard() {
      for (let row = 0; row < boardHeight; row++) {
        for (let col = 0; col < boardWidth; col++) {
          const expected = solvedBoard[row][col];
          const actual = getBoardLetter(row, col);

          if (expected === "·") {
            if (actual !== null) return false;
          } else {
            if (actual !== expected) return false;
          }
        }
      }
      return true;
    }

    function launchConfetti() {
      confettiContainer.innerHTML = "";

      const colors = ["#f87171", "#fbbf24", "#34d399", "#60a5fa", "#c084fc", "#f472b6"];

      for (let i = 0; i < 180; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.animationDuration = `${2.5 + Math.random() * 2}s`;
        piece.style.animationDelay = `${Math.random() * 0.8}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        confettiContainer.appendChild(piece);
      }

      setTimeout(() => {
        confettiContainer.innerHTML = "";
        confettiActive = false;
      }, 5200);
    }

    function maybeCelebrateSolution() {
      if (isSolvedBoard() && !confettiActive) {
        confettiActive = true;
        launchConfetti();
      }
    }

    function getNextUnrevealedHint() {
      while (revealedHintCount < hintQueue.length) {
        const nextHint = hintQueue[revealedHintCount];
        const currentTile = board[nextHint.row * boardWidth + nextHint.col];

        if (currentTile && currentTile.letter === nextHint.letter && currentTile.locked) {
          revealedHintCount++;
          continue;
        }

        return nextHint;
      }

      return null;
    }

    function revealNextHint() {
      const nextHint = getNextUnrevealedHint();
      if (!nextHint) {
        render();
        return;
      }

      const targetIndex = nextHint.row * boardWidth + nextHint.col;
      const currentTargetTile = board[targetIndex];

      if (currentTargetTile?.locked && currentTargetTile.letter === nextHint.letter) {
        revealedHintCount++;
        render();
        return;
      }

      const source = findMovableTileByLetter(nextHint.letter);
      if (!source) {
        render();
        return;
      }

      let displacedTile = null;
      if (currentTargetTile && !currentTargetTile.locked) {
        displacedTile = currentTargetTile;
      }

      if (source.area === "rack") {
        rack[source.index] = displacedTile;
      } else {
        board[source.index] = displacedTile;
      }

      source.tile.locked = true;
      board[targetIndex] = source.tile;
      selectedTileId = null;
      draggedTileId = null;
      revealedHintCount++;
      render();
    }

    function checkBoardWords() {
      if (!dictionaryLoaded) {
        alert("Dictionary is still loading.");
        return;
      }

      const wordsOnBoard = getWordsFromBoard();

      if (wordsOnBoard.length === 0) {
        alert("No words on the board yet.");
        return;
      }

      const invalidWords = wordsOnBoard.filter(entry => !dictionary.has(entry.word.toUpperCase()));

      if (invalidWords.length === 0) {
        const wordList = wordsOnBoard.map(entry => entry.word).join(", ");
        alert(`All words are valid!\n\nWords found: ${wordList}`);
      } else {
        const invalidList = invalidWords
          .map(entry => `${entry.word} (${entry.direction})`)
          .join("\n");

        const validList = wordsOnBoard
          .filter(entry => dictionary.has(entry.word.toUpperCase()))
          .map(entry => entry.word)
          .join(", ");

        let message = "Some words are invalid.\n\n";
        if (validList) {
          message += `Valid: ${validList}\n\n`;
        }
        message += `Invalid:\n${invalidList}`;

        alert(message);
      }
    }

    function isTouchDevice() {
      return "ontouchstart" in window || navigator.maxTouchPoints > 0;
    }

    function clearTouchGhost() {
      if (touchGhostEl) {
        touchGhostEl.remove();
        touchGhostEl = null;
      }
      touchDraggedTileId = null;
      touchSourceEl = null;

      document.querySelectorAll(".cell.highlight, .rack-slot.highlight").forEach(el => {
        el.classList.remove("highlight");
      });
    }

    function updateTouchGhostPosition(x, y) {
      if (!touchGhostEl) return;
      touchGhostEl.style.left = `${x - touchGhostEl.offsetWidth / 2}px`;
      touchGhostEl.style.top = `${y - touchGhostEl.offsetHeight / 2}px`;
    }

    function handleTouchStart(e, tile) {
      if (tile.locked) return;
      if (!isTouchDevice()) return;

      const touch = e.touches[0];
      touchDraggedTileId = tile.id;
      selectedTileId = tile.id;

      const ghost = e.currentTarget.cloneNode(true);
      ghost.style.position = "fixed";
      ghost.style.pointerEvents = "none";
      ghost.style.zIndex = "10000";
      ghost.style.opacity = "0.85";
      ghost.style.transform = "scale(1.05)";
      ghost.style.margin = "0";
      document.body.appendChild(ghost);

      touchGhostEl = ghost;
      touchSourceEl = e.currentTarget;
      updateTouchGhostPosition(touch.clientX, touch.clientY);
      render();
      e.preventDefault();
    }

    function handleTouchMove(e) {
      if (touchDraggedTileId === null) return;

      const touch = e.touches[0];
      updateTouchGhostPosition(touch.clientX, touch.clientY);

      document.querySelectorAll(".cell.highlight, .rack-slot.highlight").forEach(el => {
        el.classList.remove("highlight");
      });

      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const dropTarget = target?.closest(".cell, .rack-slot");
      if (dropTarget) {
        dropTarget.classList.add("highlight");
      }

      e.preventDefault();
    }

    function handleTouchEnd(e) {
      if (touchDraggedTileId === null) return;

      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const dropCell = target?.closest(".cell");
      const dropRack = target?.closest(".rack-slot");

      if (dropCell && dropCell.dataset.index !== undefined) {
        moveTile(touchDraggedTileId, "board", Number(dropCell.dataset.index));
      } else if (dropRack && dropRack.dataset.index !== undefined) {
        moveTile(touchDraggedTileId, "rack", Number(dropRack.dataset.index));
      } else {
        selectedTileId = null;
        render();
      }

      clearTouchGhost();
    }

    function createTileElement(tile, boardIndex = null) {
      const tileEl = document.createElement("div");
      tileEl.className = "tile";

      if (tile.locked) {
        tileEl.classList.add("locked");
      }

      if (boardIndex !== null) {
        const row = Math.floor(boardIndex / boardWidth);
        const col = boardIndex % boardWidth;
        const modifier = getModifierAt(row, col);

        if (modifier) {
          tileEl.classList.add(getModifierClass(modifier));
        }
      }

      if (selectedTileId === tile.id) {
        tileEl.classList.add("selected");
      }

      tileEl.draggable = !tile.locked;

      const modifierEl = document.createElement("div");
      modifierEl.className = "tile-modifier";
      modifierEl.textContent = getTileModifierText(boardIndex);

      const letterEl = document.createElement("div");
      letterEl.className = "tile-letter";
      letterEl.textContent = tile.letter;

      const pointsEl = document.createElement("div");
      pointsEl.className = "tile-points";
      pointsEl.textContent = getTilePointsText(tile);

      if (modifierEl.textContent) {
        tileEl.appendChild(modifierEl);
      }
      tileEl.appendChild(letterEl);
      tileEl.appendChild(pointsEl);

      tileEl.addEventListener("click", (e) => {
        e.stopPropagation();
        if (tile.locked) return;
        selectedTileId = selectedTileId === tile.id ? null : tile.id;
        render();
      });

      tileEl.addEventListener("dragstart", () => {
        if (tile.locked) return;
        draggedTileId = tile.id;
        selectedTileId = tile.id;
      });

      tileEl.addEventListener("dragend", () => {
        draggedTileId = null;
      });

      tileEl.addEventListener("touchstart", (e) => handleTouchStart(e, tile), { passive: false });
      tileEl.addEventListener("touchmove", handleTouchMove, { passive: false });
      tileEl.addEventListener("touchend", handleTouchEnd);
      tileEl.addEventListener("touchcancel", clearTouchGhost);

      return tileEl;
    }

    function render() {
      boardEl.innerHTML = "";
      rackEl.innerHTML = "";
      scoreEl.textContent = getTotalBoardScore();

      for (let i = 0; i < board.length; i++) {
        const row = Math.floor(i / boardWidth);
        const col = i % boardWidth;
        const modifier = getModifierAt(row, col);

        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;

        if (modifier) {
          cell.classList.add(getModifierClass(modifier));
        }

        if (shadowEnabled && isSolutionCell(row, col) && !board[i]) {
          cell.classList.add("shadow");
        }

        cell.addEventListener("click", () => {
          if (selectedTileId !== null) {
            moveTile(selectedTileId, "board", i);
          }
        });

        cell.addEventListener("dragover", (e) => {
          e.preventDefault();
          cell.classList.add("highlight");
        });

        cell.addEventListener("dragleave", () => {
          cell.classList.remove("highlight");
        });

        cell.addEventListener("drop", (e) => {
          e.preventDefault();
          cell.classList.remove("highlight");
          if (draggedTileId !== null) {
            moveTile(draggedTileId, "board", i);
            draggedTileId = null;
          }
        });

        if (board[i]) {
          cell.appendChild(createTileElement(board[i], i));
        } else if (modifier) {
          const modifierEl = document.createElement("div");
          modifierEl.className = "cell-modifier";
          modifierEl.textContent = modifier;
          cell.appendChild(modifierEl);
        }

        boardEl.appendChild(cell);
      }

      for (let i = 0; i < rack.length; i++) {
        const slot = document.createElement("div");
        slot.className = "rack-slot";
        slot.dataset.index = i;

        slot.addEventListener("click", () => {
          if (selectedTileId !== null) {
            moveTile(selectedTileId, "rack", i);
          }
        });

        slot.addEventListener("dragover", (e) => {
          e.preventDefault();
        });

        slot.addEventListener("drop", (e) => {
          e.preventDefault();
          if (draggedTileId !== null) {
            moveTile(draggedTileId, "rack", i);
            draggedTileId = null;
          }
        });

        if (rack[i]) {
          slot.appendChild(createTileElement(rack[i], null));
        } else {
          slot.classList.add("empty");
        }

        rackEl.appendChild(slot);
      }

      hintBtn.disabled = revealedHintCount >= hintQueue.length;
      shadowToggle.checked = shadowEnabled;
      maybeCelebrateSolution();
    }

    shuffleBtn.addEventListener("click", shuffleRack);
    rackBtn.addEventListener("click", rackAllTiles);
    hintBtn.addEventListener("click", revealNextHint);
    shadowToggle.addEventListener("change", toggleShadow);
    checkBtn.addEventListener("click", checkBoardWords);

    loadDictionary();
    render();
  </script>
</body>
</html>
